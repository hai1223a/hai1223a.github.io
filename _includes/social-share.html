{% include base_path %}

<section class="page__share">
  {% assign share_url = base_path | append: page.url %}
  {% assign share_title = page.title | default: site.title %}

  {% if site.data.ui-text[site.locale].share_on_label %}
    <h4 class="page__share-title">{{ site.data.ui-text[site.locale].share_on_label | default: "Share on" }}</h4>
  {% endif %}

  <a href="https://service.weibo.com/share/share.php?url={{ share_url | url_encode }}&title={{ share_title | url_encode }}" class="btn" title="{{ site.data.ui-text[site.locale].share_on_label | default: 'Share on' }} 微博" target="_blank" rel="noopener noreferrer">
    <i class="fab fa-weibo" aria-hidden="true"></i><span> 微博</span>
  </a>

  <a href="https://connect.qq.com/widget/shareqq/index.html?url={{ share_url | url_encode }}&title={{ share_title | url_encode }}" class="btn" title="{{ site.data.ui-text[site.locale].share_on_label | default: 'Share on' }} QQ" target="_blank" rel="noopener noreferrer">
    <i class="fab fa-qq" aria-hidden="true"></i><span> QQ</span>
  </a>

  <a href="https://sns.qzone.qq.com/cgi-bin/qzshare/cgi_qzshare_onekey?url={{ share_url | url_encode }}&title={{ share_title | url_encode }}" class="btn" title="{{ site.data.ui-text[site.locale].share_on_label | default: 'Share on' }} QQ 空间" target="_blank" rel="noopener noreferrer">
    <i class="fas fa-star" aria-hidden="true"></i><span> QQ 空间</span>
  </a>

  <button
    type="button"
    class="btn"
    title="复制当前文章链接"
    onclick="navigator.clipboard.writeText('{{ share_url }}').then(() => { this.querySelector('span').textContent = ' 已复制'; setTimeout(() => { this.querySelector('span').textContent = ' 复制链接'; }, 1500); });"
  >
    <i class="fas fa-link" aria-hidden="true"></i><span> 复制链接</span>
  </button>
</section>
